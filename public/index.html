<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stone Badge - GitHub 仓库石墩子徽章</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="github-badge" href="https://github.com/professor-lee/StoneBadge" target="_blank" rel="noopener noreferrer" aria-label="打开 StoneBadge 的 GitHub 仓库">
    <span class="github-badge__icon" aria-hidden="true">
      <svg viewBox="0 0 16 16" width="16" height="16" focusable="false" aria-hidden="true">
        <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.54 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.7 7.7 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.002 8.002 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
      </svg>
    </span>
    <span class="github-badge__label">Star</span>
    <span id="githubStarCount" class="github-badge__count">--</span>
  </a>

  <div class="container">
    <h1>🪨 Stone Badge</h1>
    <p class="subtitle">为你的 GitHub 仓库生成独一无二的石墩子徽章</p>

    <div class="input-group">
      <input type="text" id="repoUrl"
             placeholder="输入 GitHub 仓库链接，如 https://github.com/owner/repo" />
      <button id="generateBtn">生成徽章</button>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>正在生成...</span>
    </div>

    <div id="result" class="result hidden">
      <div class="preview">
        <h3>预览</h3>
        <div id="svgPreview"></div>
        <p class="sha-info">Short SHA: <code id="shaDisplay"></code></p>
      </div>

      <div class="links">
        <h3>在 README 中使用</h3>
        <div class="link-group">
          <label>Markdown</label>
          <div class="copy-field">
            <input type="text" id="markdownLink" readonly />
            <button class="copy-btn" data-target="markdownLink">复制</button>
          </div>
        </div>
        <div class="link-group">
          <label>HTML</label>
          <div class="copy-field">
            <input type="text" id="htmlLink" readonly />
            <button class="copy-btn" data-target="htmlLink">复制</button>
          </div>
        </div>
        <div class="link-group">
          <label>直接链接</label>
          <div class="copy-field">
            <input type="text" id="directLink" readonly />
            <button class="copy-btn" data-target="directLink">复制</button>
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
