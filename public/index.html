<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stone Badge - GitHub 仓库石墩子徽章</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🪨 Stone Badge</h1>
    <p class="subtitle">为你的 GitHub 仓库生成独一无二的石墩子徽章</p>

    <div class="input-group">
      <input type="text" id="repoUrl"
             placeholder="输入 GitHub 仓库链接，如 https://github.com/owner/repo" />
      <button id="generateBtn">生成徽章</button>
    </div>

    <div class="options-panel" aria-label="徽章生成参数">
      <p class="options-title">生成参数</p>
      <div class="options-grid">
        <label class="option-field">
          <span class="option-label">旋转动画帧数</span>
          <select id="frameCount"> </select>
        </label>
        <label class="option-field">
          <span class="option-label">投影精细度（最小三角面积）</span>
          <select id="qualityPreset"> </select>
        </label>
        <label class="option-field">
          <span class="option-label">网格减面</span>
          <select id="decimatePreset"> </select>
        </label>
        <label class="option-field">
          <span class="option-label">单圈动画时长（秒）</span>
          <select id="animDuration"> </select>
        </label>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>正在生成...</span>
    </div>

    <div id="result" class="result hidden">
      <div class="preview">
        <h3>预览</h3>
        <div id="svgPreview"></div>
        <p class="sha-info">Short SHA: <code id="shaDisplay"></code></p>
        <p class="sha-info svg-size-info">当前 SVG 体积：<code id="svgSizeDisplay">—</code></p>
      </div>

      <div class="links">
        <h3>在 README 中使用</h3>
        <div class="link-group">
          <label>Markdown</label>
          <div class="copy-field">
            <input type="text" id="markdownLink" readonly />
            <button class="copy-btn" data-target="markdownLink">复制</button>
          </div>
        </div>
        <div class="link-group">
          <label>HTML</label>
          <div class="copy-field">
            <input type="text" id="htmlLink" readonly />
            <button class="copy-btn" data-target="htmlLink">复制</button>
          </div>
        </div>
        <div class="link-group">
          <label>直接链接</label>
          <div class="copy-field">
            <input type="text" id="directLink" readonly />
            <button class="copy-btn" data-target="directLink">复制</button>
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
